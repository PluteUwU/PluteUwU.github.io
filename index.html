<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boutiques — Panel</title>
<style>
:root{
  --bg:#0F1115;--surface:#16191F;--surface2:#1C2028;--surface3:#252A33;
  --border:#22262E;--border2:#2F343E;
  --text:#E8EAEE;--text2:#969CA8;--text3:#5E646F;
  --accent:#4F8CFF;--accent2:#6FA1FF;--accent-dim:rgba(79,140,255,.12);
  --good:#5CB98A;--good-dim:rgba(92,185,138,.13);
  --mid:#D2A24C;--mid-dim:rgba(210,162,76,.14);
  --bad:#DE6B62;--bad-dim:rgba(222,107,98,.14);
  --shadow:rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
@keyframes slideRight{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
input,select,button{font-family:inherit}
input[type=range]{accent-color:var(--accent)}
button{cursor:pointer}

.root{height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--text)}

/* ── Header ── */
.hdr{flex:none;height:56px;display:flex;align-items:center;gap:14px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);z-index:10}
.hdr .brand{font:700 16px/1 system-ui;letter-spacing:-.3px;color:var(--text)}
.hdr .vline{width:1px;height:18px;background:var(--border2)}
.hdr .shown{font:500 12.5px/1 system-ui;color:var(--text3)}
.hdr .spacer{flex:1}
.hdr .maj{font:500 11.5px/1 system-ui;color:var(--text3)}
.seg{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.seg button{height:28px;padding:0 13px;border:none;border-radius:6px;background:transparent;color:var(--text2);font:600 12px system-ui;transition:all .16s}
.seg button.on{background:var(--accent);color:#fff}
.ibtn{height:32px;padding:0 12px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--text2);font:600 12px system-ui;transition:all .16s}
.ibtn:hover{border-color:var(--accent);color:var(--accent)}
.ibtn.on{background:var(--good-dim);border-color:var(--good);color:var(--good)}
.ibtn .ic{display:inline-block}

/* ── Grid ── */
.grid{flex:1;min-height:0;display:grid;grid-template-columns:248px minmax(0,1fr) 404px}

/* ── Rail ── */
.rail{overflow:auto;border-right:1px solid var(--border);padding:18px 16px;display:flex;flex-direction:column;gap:20px;background:var(--surface)}
.searchwrap{position:relative;display:flex;align-items:center}
.searchwrap .mag{position:absolute;left:13px;color:var(--text3);font-size:13px;pointer-events:none}
.search{width:100%;height:40px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0 34px 0 32px;color:var(--text);font:400 13.5px system-ui;outline:none;transition:border-color .18s}
.search:focus{border-color:var(--accent)}
.searchclear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;border-radius:6px;background:var(--surface3);color:var(--text3);font-size:12px;line-height:1;transition:all .15s}
.searchclear:hover{background:var(--bad-dim);color:var(--bad)}
.rh{font:600 10.5px system-ui;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.rh .rreset{cursor:pointer;color:var(--accent);text-transform:none;letter-spacing:0;font-size:11px}
.rh .rreset:hover{text-decoration:underline}
.catlist{display:flex;flex-direction:column;gap:1px}
.catrow{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;background:transparent;transition:background .14s}
.catrow:hover{background:var(--surface2)}
.catrow.on{background:var(--accent-dim)}
.catrow .cl{flex:1;font:600 12.5px system-ui;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.catrow.on .cl{color:var(--accent)}
.catrow .cc{font:600 11px ui-monospace,monospace;color:var(--text3)}
.catrow.on .cc{color:var(--accent)}
.fams{display:flex;gap:5px;flex-wrap:wrap}
.fam{height:27px;padding:0 10px;display:inline-flex;align-items:center;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font:600 11px ui-monospace,monospace;transition:all .15s}
.fam:hover{border-color:var(--accent)}
.fam.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.sldrow{display:flex;flex-direction:column;gap:7px}
.sldtop{display:flex;align-items:center;justify-content:space-between}
.sldtop .sv{font:600 11px ui-monospace,monospace;color:var(--accent)}
.sld{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--surface3);border-radius:3px;outline:none}
.sld::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface)}
.sld::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--surface)}
.sortsel{width:100%;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0 12px;color:var(--text2);font:600 12.5px system-ui;cursor:pointer;outline:none}
.resetbtn{height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font:600 12px system-ui;transition:all .15s}
.resetbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── List ── */
.list{overflow:auto;min-height:0;min-width:0}
.list-inner{padding:12px 10px 44px}
.empty{text-align:center;padding:80px 20px;color:var(--text3);font:500 13.5px system-ui}
.shop{padding:11px 15px;border-radius:10px;cursor:pointer;border-left:2px solid transparent;background:transparent;margin:0 6px 3px;transition:background .15s}
.shop:hover:not(.sel){background:var(--surface2)}
.shop.sel{background:var(--accent-dim);border-left-color:var(--accent)}
.shop .top{display:flex;align-items:center;gap:12px}
.shop .nm{flex:1;min-width:0;font:600 14px system-ui;letter-spacing:-.1px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop .pct{font:700 12px ui-monospace,monospace}
.rtrack{display:inline-flex;width:52px;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;flex:none}
.rtrack .rfill{border-radius:3px}
.shop .bot{display:flex;align-items:center;gap:8px;margin-top:7px}
.shop .cat{font:500 11.5px system-ui;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex:none;opacity:.6}
.chips{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.chip{font:600 10px ui-monospace,monospace;padding:2px 6px;border-radius:5px;background:var(--surface2);color:var(--text2)}
.chipmore{font:600 10px ui-monospace,monospace;color:var(--text3)}
/* compact */
.shopc{display:flex;align-items:center;gap:12px;padding:8px 15px;border-radius:8px;cursor:pointer;border-left:2px solid transparent;background:transparent;margin:0 6px 1px;transition:background .15s}
.shopc:hover:not(.sel){background:var(--surface2)}
.shopc.sel{background:var(--accent-dim);border-left-color:var(--accent)}
.shopc .nm{flex:1;min-width:0;font:600 13px system-ui;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chipmini{font:600 9.5px ui-monospace,monospace;padding:1px 5px;border-radius:4px;background:var(--surface2);color:var(--text3)}
.shopc .pct{font:700 11px ui-monospace,monospace;min-width:34px;text-align:right;flex:none}
.rtrackc{display:inline-flex;width:44px;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;flex:none}

/* ── Detail ── */
.detail{overflow:auto;min-height:0;border-left:1px solid var(--border);background:var(--surface2)}
.dwrap{animation:slideRight .26s cubic-bezier(.2,.75,.25,1)}
.dhead{position:sticky;top:0;z-index:2;background:var(--surface2);border-bottom:1px solid var(--border);padding:20px 20px 18px}
.dhtop{display:flex;align-items:flex-start;gap:12px}
.dtitle{font:700 18px system-ui;letter-spacing:-.3px;color:var(--text)}
.dsub{font:500 12px system-ui;color:var(--text3);margin-top:3px}
.closex{cursor:pointer;color:var(--text3);font-size:17px;line-height:1;padding:4px;flex:none;transition:color .15s}
.closex:hover{color:var(--text)}
.dstats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:16px}
.dstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 11px}
.dstat .dv{font:700 16px ui-monospace,monospace;color:var(--text)}
.dstat .dl{font:500 9.5px system-ui;color:var(--text3);margin-top:3px}
.dbody{padding:16px 18px 30px;display:flex;flex-direction:column;gap:10px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden}
.mcard .mpad{padding:13px 15px}
.mhead{display:flex;align-items:center;gap:9px}
.mname{font:700 13px ui-monospace,monospace;color:var(--text)}
.mfam{font:600 9px ui-monospace,monospace;letter-spacing:.4px;padding:2px 6px;border-radius:5px;background:var(--surface2);color:var(--text3)}
.mrate{margin-left:auto;font:700 12px ui-monospace,monospace}
.mstatus{font:600 9.5px ui-monospace,monospace;letter-spacing:.4px;padding:3px 7px;border-radius:6px}
.mtrack{height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;display:flex;margin:11px 0}
.mtrack .mfill{border-radius:3px}
.mmeta{display:flex;gap:14px;flex-wrap:wrap;font:500 11.5px system-ui;color:var(--text2)}
.mmeta b{color:var(--text)}
.macts{display:flex;gap:8px;margin-top:13px}
.vbtn{flex:1;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font:600 12px system-ui;transition:all .15s}
.vbtn:hover{border-color:var(--accent);color:var(--accent)}
.novouch{flex:1;font:500 11.5px system-ui;color:var(--text3);text-align:center;padding:8px 0}
.copybtn{width:92px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font:600 12px system-ui;transition:all .15s}
.copybtn:hover{border-color:var(--accent);color:var(--accent)}
.copybtn.done{border-color:var(--good);color:var(--good)}
.vpanel{background:var(--surface2);border-top:1px solid var(--border);padding:13px 15px;animation:popIn .2s ease}
.vptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.vptop .vl{font:500 11px system-ui;color:var(--text2)}
.vptop .vl b{color:var(--text)}
.vptop .vr{font:600 9.5px system-ui;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.vcols,.vrow{display:grid;grid-template-columns:90px 66px 1fr 22px;gap:8px}
.vcols{padding:0 2px 6px;border-bottom:1px solid var(--border)}
.vcols span{font:600 9px system-ui;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.vrow{padding:7px 2px;border-bottom:1px solid var(--border);font:600 11.5px ui-monospace,monospace;align-items:center}
.vrow .vd{color:var(--text2)}
.vrow .va{color:var(--text)}
.vrow .vg{color:var(--text3);font-weight:500}
.vrow.fail{background:var(--bad-dim)}
.vrow.fail .vd,.vrow.fail .va,.vrow.fail .vg{color:var(--bad)}
.vrow .vfail{font:700 9px system-ui;letter-spacing:.5px;color:var(--bad);border:1px solid var(--bad);border-radius:3px;padding:1px 3px;margin-right:4px}
.vrow .vdel{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--text3);font-size:11px;opacity:0;transition:all .13s;cursor:pointer}
.vrow:hover .vdel{opacity:.55}
.vrow .vdel:hover{opacity:1;background:var(--bad-dim);color:var(--bad)}
.vpages{display:flex;gap:5px;margin-top:11px;flex-wrap:wrap}
.vpage{min-width:27px;height:27px;padding:0 7px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font:700 11px ui-monospace,monospace;cursor:pointer;transition:all .15s}
.vpage:hover{border-color:var(--accent)}
.vpage.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.nodetail{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 34px;gap:14px}
.nodetail .ph{display:flex;flex-direction:column;gap:5px;width:120px;opacity:.5}
.nodetail .ph i{height:9px;border-radius:3px;display:block}
.nodetail .t{font:600 14px system-ui;color:var(--text2);margin-top:4px}
.nodetail .s{font:400 12.5px/1.55 system-ui;color:var(--text3);max-width:220px}

/* ── Badge "sans fiche" ── */
.nf{font:600 8.5px system-ui;text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:4px;background:var(--surface3);color:var(--text3);white-space:nowrap;flex:none}

/* ── Corbeille (modale) ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .15s;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:min(560px,100%);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px var(--shadow)}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);font:700 14px system-ui;color:var(--text)}
.modal-btn{height:30px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font:600 11.5px system-ui}
.modal-btn:hover{border-color:var(--accent);color:var(--accent)}
.modal-body{overflow:auto;padding:6px 18px 18px}
.trash-empty{text-align:center;color:var(--text3);padding:40px 0;font:500 13px system-ui}
.trash-grp{font:600 10px system-ui;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin:14px 0 4px}
.trash-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.trash-row:last-child{border-bottom:none}
.trash-meta{font:600 11px ui-monospace,monospace;color:var(--text2)}
.trash-meta .tm-method{color:var(--text3)}
.trash-restore{height:28px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--good);font:600 11.5px system-ui;white-space:nowrap}
.trash-restore:hover{border-color:var(--good);background:var(--good-dim)}

/* ── Responsive : tablette & mobile ── */
@media(max-width:900px){
  /* La page défile naturellement au lieu d'être figée en hauteur d'écran */
  html,body{height:auto;overflow:auto;-webkit-text-size-adjust:100%}
  .root{height:auto;min-height:100dvh}

  /* En-tête : passe à la ligne, on retire les éléments secondaires */
  .hdr{height:auto;flex-wrap:wrap;padding:10px 14px;gap:8px 10px;position:sticky;top:0}
  .hdr .vline,.hdr .maj,.hdr .spacer{display:none}

  /* Les 3 colonnes s'empilent */
  .grid{display:block;flex:none;min-height:0}

  /* Filtres/recherche : en haut, pleine largeur */
  .rail{display:flex;width:auto;border-right:none;border-bottom:1px solid var(--border);padding:14px;gap:16px;overflow:visible}

  /* Liste : pleine largeur, défile avec la page */
  .list{overflow:visible}
  .list-inner{padding:10px 8px 72px}

  /* Détail : s'ouvre en plein écran par-dessus la liste quand une boutique est sélectionnée */
  .detail{position:fixed;inset:0;z-index:60;display:none;border-left:none;overflow:auto}
  #app.sel-open .detail{display:block}
  .dstats{grid-template-columns:repeat(2,1fr)}
}
  /* ── Sélecteur de catégorie (réassignation depuis l'app) ── */
  .dcat{display:flex;align-items:center;gap:8px;margin-top:11px}
  .dcat .dcatl{font:600 10.5px system-ui;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);flex:none}
  .catsel{height:33px;flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 9px;color:var(--text);font:600 12.5px system-ui;cursor:pointer;outline:none;transition:border-color .15s}
  .catsel:hover,.catsel:focus{border-color:var(--accent)}
  .catreset{height:33px;padding:0 11px;flex:none;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text3);font:600 11px system-ui;cursor:pointer;transition:all .15s}
  .catreset:hover{border-color:var(--accent);color:var(--accent)}
  /* ── Bouton Publier en ligne (dans le header) ── */
  .pubbtn{position:relative;overflow:hidden;flex:none;height:34px;padding:0 15px;border-radius:10px;
    border:1px solid rgba(124,92,255,.55);background:linear-gradient(135deg,var(--accent),#7C5CFF);
    color:#fff;font:700 12px system-ui;letter-spacing:.2px;cursor:pointer;white-space:nowrap;
    box-shadow:0 4px 16px rgba(79,140,255,.35);
    transition:transform .16s cubic-bezier(.2,.7,.3,1),box-shadow .2s,filter .2s}
  .pubbtn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 9px 26px rgba(124,92,255,.5);filter:brightness(1.1)}
  .pubbtn:active:not(:disabled){transform:translateY(0)}
  /* reflet qui balaie au survol */
  .pubbtn::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);
    transform:skewX(-20deg);transition:left .55s ease}
  .pubbtn:hover:not(:disabled)::after{left:130%}
  .pubbtn:disabled{cursor:default;animation:pubpulse 1.3s ease-in-out infinite}
  @keyframes pubpulse{0%,100%{opacity:.9}50%{opacity:.55}}
  .pubbtn.done{background:linear-gradient(135deg,#3fae7c,var(--good));border-color:var(--good);
    box-shadow:0 4px 16px rgba(92,185,138,.45);animation:none;opacity:1}
  .pubbtn.err{background:linear-gradient(135deg,#c85149,var(--bad));border-color:var(--bad);
    box-shadow:0 4px 16px rgba(222,107,98,.45);animation:none;opacity:1}

  /* ═══════════ Fond ciel étoilé + hovers (esthétique) ═══════════ */
  .sky{position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:
      radial-gradient(130% 80% at 80% 6%, #1b2440 0%, rgba(27,36,64,0) 55%),
      radial-gradient(120% 90% at 12% 104%, #141b30 0%, rgba(20,27,48,0) 58%),
      linear-gradient(180deg, #0d1017 0%, #090b11 100%)}
  .starlayer{position:absolute;inset:0;will-change:transform}
  .starlayer i{position:absolute;border-radius:50%;background:#fff;animation-name:twinkle;animation-timing-function:ease-in-out;animation-iteration-count:infinite}
  .l1 i{width:1px;height:1px;box-shadow:0 0 2px rgba(255,255,255,.4)}
  .l2 i{width:1.7px;height:1.7px;box-shadow:0 0 3px rgba(205,222,255,.6)}
  .l3 i{width:2.4px;height:2.4px;box-shadow:0 0 6px rgba(190,214,255,.85)}
  .l1{animation:floaty 150s ease-in-out infinite}
  .l2{animation:floaty 110s ease-in-out infinite reverse}
  .l3{animation:floaty 82s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.18}50%{opacity:.92}}
  @keyframes floaty{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(6px,-20px,0)}}
  .shoot{position:absolute;height:1.6px;width:118px;opacity:0;transform:rotate(-20deg);transform-origin:left center;
    background:linear-gradient(90deg,#fff 0%, rgba(206,224,255,.42) 36%, rgba(255,255,255,0) 100%);
    border-radius:99px;will-change:transform,opacity}
  .shoot::after{content:"";position:absolute;left:-1px;top:50%;width:3px;height:3px;border-radius:50%;
    transform:translateY(-50%);background:#fff;box-shadow:0 0 7px 2px rgba(190,214,255,.9)}
  .sh1{top:10%;left:70%;animation:shoot 13s ease-in 4s infinite}
  .sh2{top:22%;left:88%;animation:shoot 19s ease-in 11s infinite}
  .sh3{top:4%;left:56%;animation:shoot 27s ease-in 18s infinite}
  @keyframes shoot{
    0%{opacity:0;transform:translate3d(0,0,0) rotate(-20deg)}
    5%{opacity:0}
    8%{opacity:.9}
    17%{opacity:.9}
    25%{opacity:0;transform:translate3d(-480px,175px,0) rotate(-20deg)}
    100%{opacity:0;transform:translate3d(-480px,175px,0) rotate(-20deg)}}

  /* Panneaux "verre dépoli" posés sur le ciel */
  .root{background:transparent}
  .hdr{background:rgba(18,21,28,.72);backdrop-filter:blur(16px) saturate(118%);-webkit-backdrop-filter:blur(16px) saturate(118%)}
  .rail{background:rgba(18,21,28,.56);backdrop-filter:blur(16px) saturate(118%);-webkit-backdrop-filter:blur(16px) saturate(118%)}
  .detail{background:rgba(24,27,35,.60);backdrop-filter:blur(16px) saturate(118%);-webkit-backdrop-filter:blur(16px) saturate(118%)}

  /* Hovers cartes (léger soulèvement + ombre) */
  .shop{transition:background .15s, transform .16s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .15s}
  .shop:hover:not(.sel){transform:translateY(-1px);box-shadow:0 7px 20px rgba(0,0,0,.38);border-left-color:var(--accent2)}
  .shopc{transition:background .15s, transform .16s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .15s}
  .shopc:hover:not(.sel){transform:translateY(-1px);box-shadow:0 5px 15px rgba(0,0,0,.32);border-left-color:var(--accent2)}
  .mcard{transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .22s, border-color .18s}
  .mcard:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.42);border-color:var(--border2)}
  .catrow{transition:background .14s, transform .14s}
  .catrow:hover{transform:translateX(2px)}

  @media (prefers-reduced-motion: reduce){
    .starlayer,.l1,.l2,.l3,.starlayer i,.shoot{animation:none!important}
    .starlayer i{opacity:.55}
    .shoot{display:none}
  }

  /* ── Sticker animé (coin bas-droite) ── */
  .corner-gif{position:fixed;right:4px;bottom:0;width:98px;height:auto;z-index:70;
    pointer-events:none;image-rendering:pixelated;
    filter:drop-shadow(0 3px 9px rgba(0,0,0,.4))}
  .corner-gif[src=""]{display:none}
  @media(max-width:900px){
    .corner-gif{width:66px;right:2px;bottom:0}
  }

  /* ── Header (sans poubelle ni Confort/Compact) ── */
  .hdr{gap:14px;position:relative;overflow:hidden;height:60px}
  /* voile de lumière qui balaie lentement le header */
  .hdr::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(100deg,transparent 32%,rgba(79,140,255,.10) 45%,rgba(124,92,255,.13) 55%,transparent 68%);
    background-size:260% 100%;animation:hdrsweep 9s ease-in-out infinite}
  @keyframes hdrsweep{0%{background-position:130% 0}100%{background-position:-45% 0}}
  /* liseré accent animé en bas */
  .hdr::after{content:"";position:absolute;left:0;right:0;bottom:0;height:1.5px;
    background:linear-gradient(90deg,transparent 0%,var(--accent) 22%,#7C5CFF 50%,var(--accent) 78%,transparent 100%);
    background-size:220% 100%;opacity:.65;animation:hdrline 7s linear infinite}
  @keyframes hdrline{0%{background-position:0 0}100%{background-position:220% 0}}
  .hbrand{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
  /* orbe lumineux + anneau qui se propage */
  .horb{width:11px;height:11px;border-radius:50%;flex:none;position:relative;
    background:radial-gradient(circle at 35% 32%,#d6e4ff,var(--accent) 58%,#3566cc);
    box-shadow:0 0 13px 2px rgba(79,140,255,.8)}
  .horb::after{content:"";position:absolute;inset:-5px;border-radius:50%;
    border:1px solid rgba(124,150,255,.5);animation:orbring 2.8s ease-out infinite}
  @keyframes orbring{0%{transform:scale(.65);opacity:.9}100%{transform:scale(1.75);opacity:0}}
  /* titre en dégradé animé */
  .brand{font:800 18px/1 system-ui;letter-spacing:-.5px;
    background:linear-gradient(90deg,#ffffff,#a9c6ff,#c9b6ff,#ffffff);
    background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:brandshift 9s linear infinite}
  @keyframes brandshift{0%{background-position:0 0}100%{background-position:300% 0}}
  .hcount{position:relative;z-index:1;display:inline-flex;align-items:baseline;gap:5px;padding:5px 12px;border-radius:20px;
    background:linear-gradient(135deg,rgba(79,140,255,.13),rgba(124,92,255,.10));
    border:1px solid rgba(79,140,255,.28);white-space:nowrap;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);animation:popIn .3s ease}
  .hcount b{font:800 13px ui-monospace,monospace;color:var(--accent2)}
  .hcount-sub{font:700 11px ui-monospace,monospace;color:var(--text3)}
  .hcount-lbl{font:600 11.5px system-ui;color:var(--text3);margin-left:2px}
  .maj{position:relative;z-index:1;display:inline-flex;align-items:center;gap:7px;font:500 11.5px system-ui;color:var(--text3)}
  .maj-dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex:none;
    box-shadow:0 0 8px var(--good);animation:hdotpulse 2s ease-in-out infinite}
  @keyframes hdotpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.6);opacity:.45}}
  @media(max-width:900px){ .maj{display:none} .hdr{height:auto} }
</style>
</head>

<script>
(function(){
  "use strict";

  const CAT_ORDER = ["Tech & Électronique","Mode & Vêtements","Sport & Sneakers","Luxe & Designer","Accessoires & Bijoux","Beauté & Parfums","Santé & Nutrition","Maison & Bricolage","Enfants & Jouets","Alimentation & Boissons","Auto & Moto","Voyage & Loisirs","Finance & Marketplaces","Animalerie","Fleurs & Cadeaux","Autres"];

  // ── État ──
  const state = {
    density:"confort",
    q:"", cat:"all", method:"all", delay:"all",
    sort:"name", sel:null, vouchKey:null, vouchPage:1, copiedKey:null,
    deletedVouches:[], trashOpen:false,
  };
  let listScroll=0;
  const PERSIST=["density","q","cat","method","delay","sort","sel","vouchKey","vouchPage","deletedVouches"];

  // Tranches de délai — doivent rester alignées sur delay_bucket() (build_panel.py).
  const DELAY_OPTS=[["all","Tous"],["instant","Instant"],["1-3","1-3 jours"],["5-10","5-10 jours"],["2sem","2 semaines"],["20+","+20 jours"]];

  // ── Persistance ──
  function loadState(){
    let s={};
    try{s=JSON.parse(localStorage.getItem(SKEY))||{}}catch(e){}
    PERSIST.forEach(k=>{ if(s[k]!==undefined) state[k]=s[k]; });
    if(!Array.isArray(state.deletedVouches)) state.deletedVouches=[];
    if(typeof s.listScroll==="number") listScroll=s.listScroll;
  }
  function saveState(){
    const o={};
    PERSIST.forEach(k=>o[k]=state[k]);
    o.listScroll=listScroll;
    try{localStorage.setItem(SKEY,JSON.stringify(o))}catch(e){}
  }

  // ── Helpers (portés du composant) ──
  const familyOf=n=>{ if(!n) return "—"; if(n.toUpperCase()==="DAMAGE IA") return "DAMAGE IA"; if(n.toLowerCase().startsWith("non")) return "N.P."; return n.split(" ")[0]; };
  const amountOf=s=>{ let mx=0; s.methods.forEach(m=>{const v=parseInt(m.max); if(!isNaN(v)&&v>mx)mx=v;}); return mx; };
  const IGN_FAM=new Set(["NON"]);
  const firstWord=n=>(n||"").trim().toUpperCase().split(/\s+/)[0]||"";
  // Taux d'une boutique = total réussites / total essais (CLAIM, RETRO, PR, PEB inclus).
  // Seule « Non précisée » est exclue du calcul mais reste affichée.
  const shopRate=s=>{
    const real=s.methods.filter(m=>!IGN_FAM.has(firstWord(m.name)));
    const use=real.length?real:s.methods;
    let ok=0,tot=0;
    use.forEach(m=>{ok+=m.ok; tot+=m.ok+(m.fail||0);});
    return tot?ok/tot:0;
  };
  const parseRec=t=>{ if(!t) return 9999; t=t.toLowerCase(); if(t.includes("aujourd")) return 0; if(t.includes("hier")) return 1; let m=t.match(/(\d+)\s*j/); if(m) return +m[1]; m=t.match(/(\d+)\s*sem/); if(m) return +m[1]*7; m=t.match(/(\d+)\s*mois/); if(m) return +m[1]*30; m=t.match(/(\d+)\s*an/); if(m) return +m[1]*365; return 9999; };
  const recencyOf=s=>{ let r=1e9; s.methods.forEach(m=>{const x=parseRec(m.vouch); if(x<r)r=x;}); return r; };
  const parseDate=str=>{ if(!str) return 0; const p=String(str).split("/"); if(p.length!==3) return 0; const d=+p[0],mo=+p[1],y=+p[2]; if(!y) return 0; return new Date(y,mo-1,d).getTime(); };
  // Récence fine : timestamp du vouch daté le plus récent ; à défaut, estimé depuis
  // le texte relatif ("il y a Xj"). Évite les gros paquets d'égalités du tri "Récents".
  const _NOW_TS=Date.now();
  const recencyTs=s=>{
    let best=0;
    s.methods.forEach(m=>{ const arr=DATA.VOUCHES[s.name+"|"+m.name]; if(arr) arr.forEach(v=>{ const t=parseDate(v.d); if(t>best) best=t; }); });
    if(best) return best;
    const days=recencyOf(s);
    return days>=9999 ? 0 : _NOW_TS - days*86400000;
  };
  const isAtRisk=s=>s.methods.some(m=>m.status==="fail");
  const rateColor=pct=>pct>=80?"var(--good)":pct>=45?"var(--mid)":"var(--bad)";
  const statusColor=s=>s==="ok"?"var(--good)":s==="warn"?"var(--mid)":"var(--bad)";
  const statusBg=s=>s==="ok"?"var(--good-dim)":s==="warn"?"var(--mid-dim)":"var(--bad-dim)";
  const statusLabel=s=>s==="ok"?"OK":s==="warn"?"MOYEN":"FAIL";

  // ── Familles & compteurs ──
  const FAM_SET=new Set();
  DATA.SHOPS.forEach(s=>s.methods.forEach(m=>FAM_SET.add(familyOf(m.name))));
  const FAMILIES=[...FAM_SET].sort((a,b)=>a.localeCompare(b));
  const CAT_COUNTS={}; DATA.SHOPS.forEach(s=>CAT_COUNTS[s.cat]=(CAT_COUNTS[s.cat]||0)+1);
  // Index id de vouch -> {boutique, méthode, date, montant, délai} pour la corbeille
  const VOUCH_INDEX={};
  for(const key in DATA.VOUCHES){
    const i=key.indexOf("|"), shop=key.slice(0,i), method=key.slice(i+1);
    DATA.VOUCHES[key].forEach(v=>{VOUCH_INDEX[v.id]={shop,method,d:v.d,amt:v.amt,dl:v.dl};});
  }

  // ── Réassignation de catégorie (dispo uniquement dans l'app, via le pont pywebview) ──
  // Les choix sont écrits dans cat_overrides.json côté Python et rejoués ici au chargement.
  let CAN_EDIT=false, _editInit=false, _publishing=false;
  const OVERRIDES={};
  function recomputeCatCounts(){
    for(const k in CAT_COUNTS) delete CAT_COUNTS[k];
    DATA.SHOPS.forEach(s=>CAT_COUNTS[s.cat]=(CAT_COUNTS[s.cat]||0)+1);
  }
  function applyOverrides(){
    DATA.SHOPS.forEach(s=>{ const o=OVERRIDES[s.name.toUpperCase()]; if(o) s.cat=o; });
    recomputeCatCounts();
  }
  async function initEdit(){
    if(_editInit) return;
    if(!window.pywebview||!window.pywebview.api||!window.pywebview.api.get_overrides) return;
    _editInit=true; CAN_EDIT=true;
    try{
      const ov=await window.pywebview.api.get_overrides();
      if(ov&&typeof ov==="object"){ Object.assign(OVERRIDES,ov); applyOverrides(); }
    }catch(e){}
    render();
  }
  function assignCategory(name,cat){
    if(!CAT_ORDER.includes(cat)) return;
    const s=DATA.SHOPS.find(x=>x.name===name); if(!s) return;
    s.cat=cat; OVERRIDES[name.toUpperCase()]=cat; recomputeCatCounts();
    try{ window.pywebview.api.save_category(name,cat); }catch(e){}
    render();
  }
  function assignReset(name){
    const s=DATA.SHOPS.find(x=>x.name===name); if(!s) return;
    delete OVERRIDES[name.toUpperCase()];
    s.cat=s.autoCat||"Autres"; recomputeCatCounts();
    try{ window.pywebview.api.remove_override(name); }catch(e){}
    render();
  }
  // Publie en ligne (régénère + déploie Netlify), sans re-scraper Telegram.
  function doPublish(){
    if(_publishing||!CAN_EDIT||!window.pywebview||!window.pywebview.api||!window.pywebview.api.publish) return;
    _publishing=true; render();
    try{ window.pywebview.api.publish(); }catch(e){}
    pollPublish();
  }
  function _pubBtnDone(cls,label){
    _publishing=false; render();
    const b=document.getElementById("pubBtn");
    if(b){ b.classList.add(cls); b.textContent=label; }
    setTimeout(()=>{ const x=document.getElementById("pubBtn"); if(x){ x.classList.remove("done","err"); x.textContent="⤴ Publier en ligne"; } },3000);
  }
  function pollPublish(){
    if(!window.pywebview||!window.pywebview.api||!window.pywebview.api.publish_status){ _publishing=false; render(); return; }
    window.pywebview.api.publish_status().then(r=>{
      if(!r||r.state==="running"){ setTimeout(pollPublish,700); return; }
      if(r.state==="done") _pubBtnDone("done","Publié ✓");
      else _pubBtnDone("err","Erreur — réessayer");
    }, ()=>{ setTimeout(pollPublish,700); });
  }

  // ── Échappement ──
  const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const escA=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  // ── Filtrage / tri ──
  // Une boutique passe le filtre délai si au moins un de ses vouchs (non supprimé)
  // tombe dans la tranche demandée.
  function shopHasDelay(s,bucket,del){
    return s.methods.some(m=>(DATA.VOUCHES[s.name+"|"+m.name]||[])
      .some(v=>!del.has(v.id)&&v.b===bucket));
  }

  function filtered(){
    const q=state.q.trim().toLowerCase();
    const del=new Set(state.deletedVouches);
    let arr=DATA.SHOPS.filter(s=>{
      if(state.cat!=="all"&&s.cat!==state.cat) return false;
      if(q&&!s.name.toLowerCase().includes(q)) return false;
      if(state.method!=="all"&&!s.methods.some(m=>familyOf(m.name)===state.method)) return false;
      if(state.delay!=="all"&&!shopHasDelay(s,state.delay,del)) return false;
      return true;
    });
    const by=state.sort;
    arr.sort((a,b)=>{
      if(by==="vouches") return b.totalVouches-a.totalVouches;
      if(by==="rate") return shopRate(b)-shopRate(a);
      if(by==="recent"){ const d=recencyTs(b)-recencyTs(a); return d!==0?d:a.name.localeCompare(b.name,"fr"); }
      return a.name.localeCompare(b.name,"fr");
    });
    return arr;
  }

  // ── Vue ──
  function render(){
    const listEl=document.getElementById("listCol");
    if(listEl) listScroll=listEl.scrollTop;
    app.innerHTML=view();
    app.classList.toggle("sel-open", !!state.sel); // mobile : ouvre le détail en plein écran
    const nl=document.getElementById("listCol");
    if(nl) nl.scrollTop=listScroll;
  }

  function view(){
    const arr=filtered();
    const total=DATA.SHOPS.length, shown=arr.length;
    return `<div class="hdr">
      <div class="hbrand"><span class="horb"></span><span class="brand">Boutiques</span></div>
      <span class="hcount"><b>${shown}</b>${shown!==total?`<span class="hcount-sub">/ ${total}</span>`:""}<span class="hcount-lbl">boutique${shown>1?"s":""}</span></span>
      <span class="spacer"></span>
      <span class="maj"><span class="maj-dot"></span>MàJ ${esc(BUILD_DATE)}</span>
      ${CAN_EDIT?`<button id="pubBtn" class="pubbtn" data-act="publish" ${_publishing?"disabled":""}>${_publishing?"Publication…":"⤴ Publier en ligne"}</button>`:""}
    </div>
    <div class="grid">
      ${railHTML(arr,total)}
      ${listHTML(arr)}
      ${detailHTML()}
    </div>
    ${state.trashOpen?trashHTML():""}`;
  }

  function trashHTML(){
    const items=state.deletedVouches.map(id=>({id, ...(VOUCH_INDEX[id]||{})})).filter(x=>x.shop);
    const byShop={};
    items.forEach(x=>{(byShop[x.shop]=byShop[x.shop]||[]).push(x);});
    let body;
    if(!items.length){
      body=`<div class="trash-empty">Aucun vouch supprimé.<br>Les vouchs que tu supprimes atterrissent ici et peuvent être remis.</div>`;
    } else {
      body=Object.keys(byShop).sort().map(shop=>{
        const rows=byShop[shop].map(x=>`<div class="trash-row">
          <div class="trash-meta"><span class="tm-method">${esc(x.method)}</span> · ${esc(x.d)} · <b>${esc(x.amt)}</b>${x.dl&&x.dl!=="—"?" · délai "+esc(x.dl):""}</div>
          <button class="trash-restore" data-act="restorevouch" data-id="${escA(x.id)}">↩ Remettre</button>
        </div>`).join("");
        return `<div class="trash-grp">${esc(shop)}</div>${rows}`;
      }).join("");
    }
    return `<div class="modal-ov" data-act="trashbg"><div class="modal">
      <div class="modal-head"><span>Corbeille — ${items.length} vouch${items.length>1?"s":""} supprimé${items.length>1?"s":""}</span>
        <div style="display:flex;gap:8px;align-items:center">${items.length?`<button class="modal-btn" data-act="restoreall">Tout remettre</button>`:""}<span class="closex" data-act="closetrash" title="Fermer">✕</span></div></div>
      <div class="modal-body">${body}</div>
    </div></div>`;
  }

  function railHTML(arr,total){
    const cats=[{id:"all",label:"Toutes",count:total}]
      .concat(CAT_ORDER.filter(c=>CAT_COUNTS[c]).map(c=>({id:c,label:c,count:CAT_COUNTS[c]})));
    const catRows=cats.map(c=>{
      const on=state.cat===c.id;
      return `<div class="catrow ${on?"on":""}" data-act="cat" data-cat="${escA(c.id)}"><span class="cl">${esc(c.label)}</span><span class="cc">${c.count}</span></div>`;
    }).join("");
    const fams=[{id:"all",label:"Toutes"}].concat(FAMILIES.map(f=>({id:f,label:f})));
    const famChips=fams.map(f=>{
      const on=state.method===f.id;
      return `<span class="fam ${on?"on":""}" data-act="method" data-fam="${escA(f.id)}">${esc(f.label)}</span>`;
    }).join("");
    const delChips=DELAY_OPTS.map(([id,l])=>{
      const on=state.delay===id;
      return `<span class="fam ${on?"on":""}" data-act="delay" data-dl="${escA(id)}">${esc(l)}</span>`;
    }).join("");
    const sorts=[["name","Nom A→Z"],["vouches","Vouches ↓"],["rate","Taux ↓"],["recent","Récents"]];
    const sortOpts=sorts.map(([v,l])=>`<option value="${v}" ${state.sort===v?"selected":""}>${l}</option>`).join("");
    const hasFilters=state.cat!=="all"||state.method!=="all"||state.delay!=="all"||!!state.q.trim();
    return `<div class="rail">
      <div class="searchwrap"><span class="mag">⌕</span><input id="searchInp" class="search" placeholder="Rechercher…" value="${escA(state.q)}">${state.q?`<button class="searchclear" data-act="clearsearch" title="Effacer">✕</button>`:""}</div>
      <div><div class="rh">Catégorie</div><div class="catlist">${catRows}</div></div>
      <div><div class="rh">Méthode</div><div class="fams">${famChips}</div></div>
      <div><div class="rh">Délai</div><div class="fams">${delChips}</div></div>
      <div><div class="rh">Trier par</div><select id="sortSel" class="sortsel">${sortOpts}</select></div>
      ${hasFilters?`<button class="resetbtn" data-act="reset">Réinitialiser les filtres</button>`:""}
      <div style="flex:1"></div>
    </div>`;
  }

  function listHTML(arr){
    if(arr.length===0){
      return `<div class="list" id="listCol"><div class="list-inner"><div class="empty">Aucune boutique ne correspond à ces filtres.</div></div></div>`;
    }
    const compact=state.density==="compact";
    const rows=arr.map(s=>{
      const pct=Math.round(shopRate(s)*100);
      const rc=rateColor(pct);
      const sel=state.sel===s.name;
      const fams=[]; const seen=new Set();
      s.methods.forEach(m=>{const f=familyOf(m.name); if(!seen.has(f)){seen.add(f);fams.push(f);}});
      const w=(pct>0?pct:3)+"%";
      if(compact){
        const chips=fams.slice(0,2).map(f=>`<span class="chipmini">${esc(f)}</span>`).join("");
        return `<div class="shopc ${sel?"sel":""}" data-act="select" data-name="${escA(s.name)}">
          <span class="nm">${esc(s.name)}</span>
          <span style="display:flex;gap:4px;flex:none">${chips}</span>
          <span class="pct" style="color:${rc}">${pct}%</span>
          <span class="rtrackc"><span class="rfill" style="width:${w};background:${rc};height:100%;display:block"></span></span>
        </div>`;
      }
      const chips=fams.slice(0,3).map(f=>`<span class="chip">${esc(f)}</span>`).join("");
      const more=fams.length>3?`<span class="chipmore">+${fams.length-3}</span>`:"";
      return `<div class="shop ${sel?"sel":""}" data-act="select" data-name="${escA(s.name)}">
        <div class="top">
          <span class="nm">${esc(s.name)}</span>
          <span class="pct" style="color:${rc}">${pct}%</span>
          <span class="rtrack"><span class="rfill" style="width:${w};background:${rc};height:100%;display:block"></span></span>
        </div>
        <div class="bot">
          <span class="cat">${esc(s.cat)}</span>
          <span class="dot"></span>
          <span class="chips">${chips}${more}</span>
          ${s.noFiche?'<span class="nf">sans fiche</span>':''}
        </div>
      </div>`;
    }).join("");
    return `<div class="list" id="listCol"><div class="list-inner">${rows}</div></div>`;
  }

  function detailHTML(){
    if(!state.sel) return noDetailHTML();
    const s=DATA.SHOPS.find(x=>x.name===state.sel);
    if(!s) return noDetailHTML();
    const amount=amountOf(s), pct=Math.round(shopRate(s)*100);
    const ok=s.methods.reduce((a,m)=>a+m.ok,0), fail=s.methods.reduce((a,m)=>a+(m.fail||0),0);
    const cards=s.methods.map(m=>{
      const total=m.ok+(m.fail||0), rp=total?Math.round(m.ok/total*100):0;
      const rc=rateColor(rp);
      const vkey=s.name+"|"+m.name;
      const del=new Set(state.deletedVouches);
      const raw=(DATA.VOUCHES[vkey]||[]).filter(v=>!del.has(v.id));
      const vCount=raw.length, open=state.vouchKey===vkey;
      const copied=state.copiedKey===vkey;
      let vpanel="";
      if(open&&vCount>0){
        const sorted=raw.slice().sort((a,b)=>parseDate(b.d)-parseDate(a.d));
        const per=6, totalPages=Math.max(1,Math.ceil(vCount/per)), page=Math.min(state.vouchPage,totalPages);
        const items=sorted.slice((page-1)*per,(page-1)*per+per).map(x=>{
          const dl=(x.dl&&x.dl!=="—")?("délai "+x.dl):"—";
          const badge=x.f?`<b class="vfail">FAIL</b>`:"";
          return `<div class="vrow ${x.f?"fail":""}"><span class="vd">${esc(x.d)}</span><span class="va">${esc(x.amt)}</span><span class="vg">${badge}${esc(dl)}</span><span class="vdel" data-act="delvouch" data-id="${escA(x.id)}" title="Supprimer ce vouch (jugé faux)">✕</span></div>`;
        }).join("");
        const sum=raw.reduce((a,x)=>a+(parseInt(x.amt)||0),0);
        let pages="";
        if(totalPages>1){
          pages=`<div class="vpages">`+Array.from({length:totalPages},(_,i)=>`<span class="vpage ${i+1===page?"on":""}" data-act="page" data-page="${i+1}">${i+1}</span>`).join("")+`</div>`;
        }
        vpanel=`<div class="vpanel">
          <div class="vptop"><span class="vl">${vCount} vouch${vCount>1?"s":""} · total <b>${sum?sum.toLocaleString("fr-FR")+"€":"—"}</b></span><span class="vr">récent → ancien</span></div>
          <div class="vcols"><span>Date</span><span>Montant</span><span>Délai</span><span></span></div>
          <div>${items}</div>
          ${pages}
        </div>`;
      }
      const actions=vCount>0
        ? `<button class="vbtn" data-act="vouch" data-vkey="${escA(vkey)}">${open?"Masquer les vouches":("Voir "+vCount+" vouch"+(vCount>1?"s":""))}</button>`
        : `<div class="novouch">${m.vouch&&m.vouch!=="—"?("Dernier test : "+esc(m.vouch)):"Aucun vouch détaillé"}</div>`;
      return `<div class="mcard"><div class="mpad">
        <div class="mhead">
          <span class="mname">${esc(m.name)}</span>
          <span class="mfam">${esc(familyOf(m.name))}</span>
          ${m.noFiche?'<span class="nf">sans fiche</span>':''}
          <span class="mrate" style="color:${rc}">${rp}%</span>
          <span class="mstatus" style="background:${statusBg(m.status)};color:${statusColor(m.status)}">${statusLabel(m.status)}</span>
        </div>
        <div class="mtrack"><span class="mfill" style="width:${(rp>0?rp:3)}%;background:${rc};height:100%;display:block"></span></div>
        <div class="mmeta">
          <span><span style="color:var(--good);font-weight:700">${m.ok}</span> réuss.</span>
          <span><span style="color:var(--bad);font-weight:700">${m.fail||0}</span> fail</span>
          <span>Max <b>${esc(m.max)}</b></span>
          <span>Délai ${esc(m.delay)}</span>
        </div>
        <div class="macts">
          ${actions}
          <button class="copybtn ${copied?"done":""}" data-act="copy" data-name="${escA(s.name)}" data-method="${escA(m.name)}" title="Copier les infos">${copied?"Copié":"Copier"}</button>
        </div>
      </div>${vpanel}</div>`;
    }).join("");
    return `<div class="detail" id="detailCol"><div class="dwrap">
      <div class="dhead">
        <div class="dhtop">
          <div style="flex:1;min-width:0"><div class="dtitle">${esc(s.name)}</div><div class="dsub">${esc(s.cat)} · ${s.methods.length} méthode${s.methods.length>1?"s":""}${s.noFiche?' · <span style="color:var(--mid)">sans fiche</span>':''}</div></div>
          <span class="closex" data-act="close" title="Fermer">✕</span>
        </div>
        ${CAN_EDIT?`<div class="dcat"><span class="dcatl">Classer</span>
          <select class="catsel" data-name="${escA(s.name)}">${CAT_ORDER.map(c=>`<option value="${escA(c)}"${c===s.cat?" selected":""}>${esc(c)}</option>`).join("")}</select>
          ${OVERRIDES[s.name.toUpperCase()]?`<button class="catreset" data-act="assignreset" data-name="${escA(s.name)}" title="Revenir au classement automatique (${escA(s.autoCat||"Autres")})">↺ auto</button>`:""}
        </div>`:""}
        <div class="dstats">
          <div class="dstat"><div class="dv">${s.totalVouches}</div><div class="dl">vouches</div></div>
          <div class="dstat"><div class="dv" style="color:${rateColor(pct)}">${pct}%</div><div class="dl">taux</div></div>
          <div class="dstat"><div class="dv">${amount?amount+"€":"—"}</div><div class="dl">max</div></div>
          <div class="dstat"><div class="dv"><span style="color:var(--good)">${ok}</span><span style="color:var(--text3)"> / </span><span style="color:var(--bad)">${fail}</span></div><div class="dl">réuss./fail</div></div>
        </div>
      </div>
      <div class="dbody">${cards}</div>
    </div></div>`;
  }

  function noDetailHTML(){
    return `<div class="detail" id="detailCol"><div class="nodetail">
      <div class="ph"><i style="background:var(--border2);width:100%"></i><i style="background:var(--border);width:72%"></i><i style="background:var(--border);width:86%"></i></div>
      <div class="t">Sélectionne une boutique</div>
      <div class="s">Ses méthodes, taux de réussite et le détail des vouches s'afficheront ici.</div>
    </div></div>`;
  }

  // ── setState ──
  function setState(patch){
    const p=typeof patch==="function"?patch(state):patch;
    Object.assign(state,p);
    saveState();
    render();
  }

  // ── Densité ──
  function setDensity(d){ setState({density:d}); }

  // ── Copie ──
  function doCopy(shopName,methodName,vkey){
    const s=DATA.SHOPS.find(x=>x.name===shopName); if(!s) return;
    const m=s.methods.find(x=>x.name===methodName); if(!m) return;
    const total=m.ok+(m.fail||0), rp=total?Math.round(m.ok/total*100):0;
    const text=s.name+" · "+m.name+"\nTaux "+rp+"% — "+m.ok+" réussites / "+(m.fail||0)+" fails\nMontant max "+m.max+" · Délai "+m.delay+"\nDernier vouch : "+m.vouch;
    const done=()=>{ setState({copiedKey:vkey}); clearTimeout(doCopy._t); doCopy._t=setTimeout(()=>setState({copiedKey:null}),1300); };
    const fallback=()=>{ try{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}catch(e){} done(); };
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done,fallback); }
      else fallback();
    }catch(e){ fallback(); }
  }

  // ── Délégation d'événements ──
  app.addEventListener("click",e=>{
    const el=e.target.closest("[data-act]");
    if(!el) return;
    const act=el.dataset.act;
    if(act==="cat") setState({cat:el.dataset.cat});
    else if(act==="method") setState({method:el.dataset.fam});
    else if(act==="delay") setState({delay:el.dataset.dl});
    else if(act==="reset") setState({q:"",cat:"all",method:"all",delay:"all"});
    else if(act==="density") setDensity(el.dataset.density);
    else if(act==="select") setState(p=>({sel:p.sel===el.dataset.name?null:el.dataset.name,vouchKey:null,vouchPage:1}));
    else if(act==="close") setState({sel:null,vouchKey:null});
    else if(act==="vouch") setState(p=>({vouchKey:p.vouchKey===el.dataset.vkey?null:el.dataset.vkey,vouchPage:1}));
    else if(act==="page") setState({vouchPage:+el.dataset.page});
    else if(act==="copy") doCopy(el.dataset.name,el.dataset.method,el.dataset.name+"|"+el.dataset.method);
    else if(act==="clearsearch"){ setState({q:""}); const si=document.getElementById("searchInp"); if(si) si.focus(); }
    else if(act==="delvouch"){ const id=el.dataset.id; if(id&&!state.deletedVouches.includes(id)) setState({deletedVouches:state.deletedVouches.concat([id])}); }
    else if(act==="trash") setState({trashOpen:true});
    else if(act==="closetrash") setState({trashOpen:false});
    else if(act==="trashbg"){ if(e.target===el) setState({trashOpen:false}); }
    else if(act==="restorevouch") setState({deletedVouches:state.deletedVouches.filter(x=>x!==el.dataset.id)});
    else if(act==="restoreall") setState({deletedVouches:[]});
    else if(act==="assignreset") assignReset(el.dataset.name);
    else if(act==="publish") doPublish();
  });

  app.addEventListener("input",e=>{
    if(e.target.id==="searchInp"){
      const pos=e.target.selectionStart;
      setState({q:e.target.value});
      const ni=document.getElementById("searchInp");
      if(ni){ ni.focus(); try{ni.setSelectionRange(pos,pos);}catch(_){} }
    }
  });

  app.addEventListener("change",e=>{
    if(e.target.id==="sortSel") setState({sort:e.target.value});
    else if(e.target.classList.contains("catsel")) assignCategory(e.target.dataset.name,e.target.value);
  });

  // Sauvegarde du scroll de la liste
  app.addEventListener("scroll",e=>{
    if(e.target && e.target.id==="listCol"){
      listScroll=e.target.scrollTop;
      if(!saveState._t) saveState._t=setTimeout(()=>{saveState._t=null;saveState();},300);
    }
  },true);

  // ── Démarrage ──
  loadState();
  state.density="confort";   // plus de toggle : toujours en confort
  render();
  const nl=document.getElementById("listCol");
  if(nl) nl.scrollTop=listScroll;
  // Active la réassignation si on tourne dans l'app (pont pywebview présent).
  window.addEventListener("pywebviewready", initEdit);
  setTimeout(initEdit, 800);
})();
</script>
<script>
/* Génère le champ d'étoiles (3 couches parallax, scintillement aléatoire). */
(function(){
  var sky=document.querySelector('.sky'); if(!sky) return;
  var mobile=window.innerWidth<700;
  var layers=[['l1',mobile?55:110],['l2',mobile?28:55],['l3',mobile?12:22]];
  layers.forEach(function(L){
    var div=document.createElement('div'); div.className='starlayer '+L[0];
    var h='';
    for(var i=0;i<L[1];i++){
      var x=(Math.random()*100).toFixed(3), y=(Math.random()*100).toFixed(3);
      var dur=(Math.random()*3.5+2.2).toFixed(2), del=(Math.random()*6).toFixed(2);
      h+='<i style="left:'+x+'%;top:'+y+'%;animation-duration:'+dur+'s;animation-delay:'+del+'s"></i>';
    }
    div.innerHTML=h;
    sky.insertBefore(div, sky.firstChild);   // étoiles derrière, filantes au-dessus
  });
})();
</script>
</body>
